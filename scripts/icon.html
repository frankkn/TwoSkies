<!doctype html>
<meta charset="utf-8" />
<style>
  body { margin: 0; }
  /* 兩片天空:上半夜空(月),下半晝空(日)。幾何極簡,小尺寸也讀得出來 */
  .icon { position: relative; width: 512px; height: 512px; overflow: hidden; }
  .night { position: absolute; inset: 0 0 50% 0; background: linear-gradient(#0b1026, #232d5c); }
  .day { position: absolute; inset: 50% 0 0 0; background: linear-gradient(#3f7fc4, #8ec9ef); }
  .moon {
    position: absolute; top: 88px; right: 96px; width: 88px; height: 88px; border-radius: 50%;
    background: #e8ecf7; box-shadow: 0 0 36px 10px rgba(232, 236, 247, 0.35);
  }
  .sun {
    position: absolute; bottom: 88px; left: 96px; width: 96px; height: 96px; border-radius: 50%;
    background: #ffe9a8; box-shadow: 0 0 44px 16px rgba(255, 233, 168, 0.55);
  }
  .star { position: absolute; border-radius: 50%; background: #dfe6fa; }
  .s1 { top: 72px; left: 108px; width: 8px; height: 8px; }
  .s2 { top: 148px; left: 196px; width: 6px; height: 6px; opacity: 0.85; }
  .s3 { top: 96px; left: 300px; width: 5px; height: 5px; opacity: 0.7; }
  .s4 { top: 190px; left: 88px; width: 5px; height: 5px; opacity: 0.6; }
  /* 交界處的微光——兩片天空相遇的那條線 */
  .horizon {
    position: absolute; top: 50%; left: 0; right: 0; height: 2px; transform: translateY(-1px);
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.55), transparent);
  }
</style>
<div class="icon" id="icon">
  <div class="night"></div>
  <div class="day"></div>
  <div class="star s1"></div>
  <div class="star s2"></div>
  <div class="star s3"></div>
  <div class="star s4"></div>
  <div class="moon"></div>
  <div class="sun"></div>
  <div class="horizon"></div>
</div>
